<!DOCTYPE html>
<html>
<head>
  <title>ScreenStream — Microphone Access Required</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f11;
      color: #f4f4f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      max-width: 440px;
    }
    h1 { font-size: 1.75rem; margin-bottom: 1rem; color: #ffffff; }
    p { color: #a1a1aa; line-height: 1.6; margin-bottom: 2rem; font-size: 1rem; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.85rem 1.75rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #1d4ed8; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Microphone Access Required</h1>
    <p>To use voice controls and hands-free navigation, ScreenStream needs permission to use your microphone. Please click the button below to authorize.</p>
    <button id="allow-btn">Grant Permission</button>
  </div>
  <script src="permission.js"></script>
</body>
</html>
